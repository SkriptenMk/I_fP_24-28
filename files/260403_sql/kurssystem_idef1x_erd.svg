<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background: #ffffff;">
<style>
  .ent { fill: #f8f7f5; stroke: #2c2c2a; stroke-width: 1; }
  .ent-dep { fill: #f8f7f5; stroke: #2c2c2a; stroke-width: 1; }
  .hdr-line { stroke: #2c2c2a; stroke-width: 1; }
  .rel-line { stroke: #2c2c2a; stroke-width: 1.2; fill: none; }
  .dot-filled { fill: #2c2c2a; stroke: none; }
  .lbl { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2c2c2a; }
  .attr { font-family: sans-serif; font-size: 12px; fill: #2c2c2a; }
  .attr-fk { font-family: sans-serif; font-size: 12px; fill: #2c2c2a; font-style: italic; }
  .rel-lbl { font-family: sans-serif; font-size: 11px; fill: #73726c; }
  .pk-marker { font-family: sans-serif; font-size: 10px; fill: #73726c; }
</style>

<!-- COURSE (independent entity, square corners) -->
<rect class="ent" x="40" y="40" width="200" height="110"/>
<line class="hdr-line" x1="40" y1="75" x2="240" y2="75"/>
<text class="lbl" x="140" y="63" text-anchor="middle">Course</text>
<text class="attr" x="56" y="95">course_id (PK)</text>
<text class="attr" x="56" y="113">subject</text>
<text class="attr" x="56" y="131">teacher</text>

<!-- STUDENT (independent entity, square corners) -->
<rect class="ent" x="440" y="40" width="200" height="126"/>
<line class="hdr-line" x1="440" y1="75" x2="640" y2="75"/>
<text class="lbl" x="540" y="63" text-anchor="middle">Student</text>
<text class="attr" x="456" y="95">student_no (PK)</text>
<text class="attr" x="456" y="113">name</text>
<text class="attr" x="456" y="131">prename</text>
<text class="attr" x="456" y="149">date_of_birth</text>

<!-- CLASS (dependent entity, rounded corners) -->
<rect class="ent-dep" x="40" y="250" width="200" height="95" rx="12"/>
<line class="hdr-line" x1="40" y1="285" x2="240" y2="285"/>
<text class="lbl" x="140" y="273" text-anchor="middle">Class</text>
<text class="attr-fk" x="56" y="305">course_id (FK)</text>
<text class="attr" x="56" y="323">class_id (PK)</text>

<!-- ENROLLMENT (dependent/associative entity, rounded corners) -->
<rect class="ent-dep" x="240" y="400" width="200" height="80" rx="12"/>
<line class="hdr-line" x1="240" y1="435" x2="440" y2="435"/>
<text class="lbl" x="340" y="423" text-anchor="middle">Enrollment</text>
<text class="attr-fk" x="256" y="455">student_no (FK/PK)</text>
<text class="attr-fk" x="256" y="473">class_id (FK/PK)</text>

<!-- MARK (dependent entity, rounded corners) -->
<rect class="ent-dep" x="240" y="540" width="200" height="146" rx="12"/>
<line class="hdr-line" x1="240" y1="575" x2="440" y2="575"/>
<text class="lbl" x="340" y="563" text-anchor="middle">Mark</text>
<text class="attr" x="256" y="595">mark_id (PK)</text>
<text class="attr-fk" x="256" y="613">student_no (FK)</text>
<text class="attr-fk" x="256" y="631">class_id (FK)</text>
<text class="attr" x="256" y="649">mark</text>
<text class="attr" x="256" y="667">datum</text>

<!-- RELATIONSHIPS -->

<!-- Course -> Class (identifying, 1:N) -->
<line class="rel-line" x1="140" y1="150" x2="140" y2="250"/>
<circle class="dot-filled" cx="140" cy="250" r="4"/>
<text class="rel-lbl" x="148" y="200">enthält</text>
<text class="pk-marker" x="148" y="165">P</text>

<!-- Student -> Enrollment (identifying, 1:N) -->
<line class="rel-line" x1="540" y1="166" x2="540" y2="440"/>
<line class="rel-line" x1="540" y1="440" x2="440" y2="440"/>
<circle class="dot-filled" cx="440" cy="440" r="4"/>
<text class="rel-lbl" x="548" y="310">eingeschrieben</text>
<text class="pk-marker" x="548" y="182">P</text>

<!-- Class -> Enrollment (identifying, 1:N) -->
<line class="rel-line" x1="140" y1="345" x2="140" y2="440"/>
<line class="rel-line" x1="140" y1="440" x2="240" y2="440"/>
<circle class="dot-filled" cx="240" cy="440" r="4"/>
<text class="rel-lbl" x="100" y="395" text-anchor="end">belegt</text>
<text class="pk-marker" x="148" y="360">P</text>

<!-- Enrollment -> Mark (identifying, 1:N) -->
<line class="rel-line" x1="340" y1="480" x2="340" y2="540"/>
<circle class="dot-filled" cx="340" cy="540" r="4"/>
<text class="rel-lbl" x="348" y="515">bewertet</text>
<text class="pk-marker" x="348" y="495">P</text>

<!-- LEGENDE -->
<rect x="480" y="610" width="180" height="90" rx="6" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="rel-lbl" x="490" y="628">Legende (IDEF1X)</text>
<rect x="490" y="638" width="30" height="14" fill="none" stroke="#2c2c2a" stroke-width="1"/>
<text class="attr" x="526" y="649">Unabhängige Entität</text>
<rect x="490" y="660" width="30" height="14" rx="5" fill="none" stroke="#2c2c2a" stroke-width="1"/>
<text class="attr" x="526" y="671">Abhängige Entität</text>
<circle class="dot-filled" cx="505" cy="688" r="3"/>
<text class="attr" x="526" y="692">Identifying Rel. (N-Seite)</text>
</svg>
